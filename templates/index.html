<!DOCTYPE html>
<html>
<head>
  <title>Heart Disease Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .card { border-radius: 16px; }
    .result-box { display:none; border-radius: 12px; padding: 20px; margin-top: 20px; text-align: center; }
    .high-risk { background: #fff0f0; border: 2px solid #e74c3c; color: #c0392b; }
    .low-risk  { background: #f0fff4; border: 2px solid #27ae60; color: #1e8449; }
    .risk-label { font-size: 28px; font-weight: bold; }
    .risk-prob  { font-size: 16px; margin-top: 6px; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="card shadow p-4">
    <h2 class="mb-1 text-center">Heart Disease Predictor</h2>
    <p class="text-center text-muted mb-4">Enter patient details below</p>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Age</label>
        <input type="number" id="age" class="form-control" placeholder="e.g. 52">
      </div>
      <div class="col-md-4">
        <label class="form-label">Sex (1=Male, 0=Female)</label>
        <input type="number" id="sex" class="form-control" placeholder="1 or 0">
      </div>
      <div class="col-md-4">
        <label class="form-label">Chest Pain Type (0-3)</label>
        <input type="number" id="cp" class="form-control" placeholder="0 to 3">
      </div>
      <div class="col-md-4">
        <label class="form-label">Resting Blood Pressure</label>
        <input type="number" id="trestbps" class="form-control" placeholder="e.g. 120">
      </div>
      <div class="col-md-4">
        <label class="form-label">Cholesterol</label>
        <input type="number" id="chol" class="form-control" placeholder="e.g. 200">
      </div>
      <div class="col-md-4">
        <label class="form-label">Fasting Blood Sugar &gt;120 (1=Yes, 0=No)</label>
        <input type="number" id="fbs" class="form-control" placeholder="1 or 0">
      </div>
      <div class="col-md-4">
        <label class="form-label">Resting ECG (0-2)</label>
        <input type="number" id="restecg" class="form-control" placeholder="0 to 2">
      </div>
      <div class="col-md-4">
        <label class="form-label">Max Heart Rate</label>
        <input type="number" id="thalach" class="form-control" placeholder="e.g. 150">
      </div>
      <div class="col-md-4">
        <label class="form-label">Exercise Induced Angina (1=Yes, 0=No)</label>
        <input type="number" id="exang" class="form-control" placeholder="1 or 0">
      </div>
      <div class="col-md-4">
        <label class="form-label">ST Depression (oldpeak)</label>
        <input type="number" step="0.1" id="oldpeak" class="form-control" placeholder="e.g. 1.0">
      </div>
      <div class="col-md-4">
        <label class="form-label">Slope (0-2)</label>
        <input type="number" id="slope" class="form-control" placeholder="0 to 2">
      </div>
      <div class="col-md-4">
        <label class="form-label">Major Vessels (0-4)</label>
        <input type="number" id="ca" class="form-control" placeholder="0 to 4">
      </div>
      <div class="col-md-4">
        <label class="form-label">Thal (0-3)</label>
        <input type="number" id="thal" class="form-control" placeholder="0 to 3">
      </div>
    </div>
    <div class="text-center mt-4">
      <button class="btn btn-primary px-5 py-2" onclick="predict()">Predict</button>
    </div>
    <div class="result-box" id="result-box">
      <div class="risk-label" id="risk-label"></div>
      <div class="risk-prob"  id="risk-prob"></div>
    </div>
  </div>
</div>
<script>
function predict() {
  const fields = ['age','sex','cp','trestbps','chol','fbs',
                  'restecg','thalach','exang','oldpeak','slope','ca','thal'];
  const data = {};
  for (let f of fields) {
    data[f] = parseFloat(document.getElementById(f).value);
  }
  fetch('/predict', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(res => {
    const box = document.getElementById('result-box');
    box.style.display = 'block';
    box.className = 'result-box ' + (res.prediction === 1 ? 'high-risk' : 'low-risk');
    document.getElementById('risk-label').textContent = res.label;
    document.getElementById('risk-prob').textContent  = 'Confidence: ' + res.probability + '%';
  });
}
</script>
</body>
</html>
